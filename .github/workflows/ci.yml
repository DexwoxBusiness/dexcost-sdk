name: CI

# DexCost SDK CI uses two blocking layers:
#
# 1. Per-SDK test jobs (python, go, typescript, rust) MUST pass. Each runs
#    that SDK's existing test suite (including bundled catalog drift checks
#    like test_compute_catalog_integrity / gpu-catalog-drift.test.ts) and
#    excludes the parity/conformance files exercised once in the shared gate.
#
# 2. cross-sdk-conformance MUST pass. It runs both the historical serialization
#    and pricing parity suites and the attribution-v2 contract corpus in all
#    four languages. A contract regression in any SDK blocks merge.
#
# Per-SDK hardening flags pin specific audit findings:
#   - Go    : -race (catches B13 session race, race conditions in pusher)
#   - Rust  : clippy --deny warnings (catches B7 panic paths in clippy lints)
#   - TS    : node 20 + node 22 matrix (catches B9 native-binding ABI drift
#             and runtime-specific issues like B10 fork-safety surface)
#   - Python: 3.10 + 3.11 + 3.12 matrix (catches version-specific regressions)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  python:
    name: python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio
      - name: Test (excluding shared conformance gate files)
        working-directory: python
        run: >-
          python -m pytest tests/
          --ignore=tests/test_cross_sdk_parity.py
          --ignore=tests/test_attribution_v2_conformance.py
          -v

  go:
    name: go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: go/go.sum
      - name: Test with -race (excluding shared conformance gate tests)
        working-directory: go
        # -race catches B13 session race + transport pusher accounting bugs.
        # -skip introduced in Go 1.20.
        run: >-
          go test -race
          -skip '^(TestCrossSDK|TestSharedAttributionV2Conformance|TestValidateEventV2)'
          ./...

  typescript:
    name: typescript tests (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - name: Install
        working-directory: typescript
        run: npm ci || npm install
      - name: Lint (tsc --noEmit)
        working-directory: typescript
        run: npm run lint
      - name: Test (excluding shared conformance gate files)
        working-directory: typescript
        run: >-
          npx vitest run
          --exclude 'tests/{cross-sdk-parity,attribution-v2-conformance,attribution-v2-pusher-conformance}.test.ts'
      - name: Build + runtime smoke (node control)
        working-directory: typescript
        run: npm run build && node scripts/runtime-smoke.mjs

  # Enforces the "works on Bun and Deno" claim against the BUILT package —
  # not just documentation. The smoke script exercises init, explicit
  # track(), the ambient fetch capture, the AI SDK middleware, the Hono
  # middleware, and `dexcost doctor` on each runtime. This job caught real
  # bugs on day one (Bun: better-sqlite3 crash instead of memory fallback;
  # Deno: fatal native-addon dlopen, missing Buffer global).
  typescript-runtimes:
    name: typescript runtime smoke (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [bun, deno]
    steps:
      - uses: actions/checkout@v4
      # Node is always needed: the package builds with tsc/esbuild on Node.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - name: Install
        working-directory: typescript
        run: npm ci || npm install
      - name: Build
        working-directory: typescript
        run: npm run build
      - uses: oven-sh/setup-bun@v2
        if: matrix.runtime == 'bun'
        with:
          bun-version: latest
      - uses: denoland/setup-deno@v2
        if: matrix.runtime == 'deno'
        with:
          deno-version: v2.x
      - name: Runtime smoke (bun)
        if: matrix.runtime == 'bun'
        working-directory: typescript
        run: bun scripts/runtime-smoke.mjs
      - name: Runtime smoke (deno)
        if: matrix.runtime == 'deno'
        working-directory: typescript
        run: deno run --allow-all scripts/runtime-smoke.mjs

  rust:
    name: rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      # Clippy is non-blocking on initial CI setup: there are 18 pre-existing
      # violations including await_holding_lock (a real deadlock vector) that
      # Sprint 2/3 will clean up. Once green, flip continue-on-error to false
      # and tighten -W to -D.
      - name: Clippy (non-blocking)
        working-directory: rust
        continue-on-error: true
        run: cargo clippy --all-targets -- -W clippy::all
      - name: Test (lib + bins + non-gate integration tests)
        working-directory: rust
        # Each integration test in tests/*.rs is its own binary; the two
        # shared-gate binaries run only in cross-sdk-conformance below.
        run: |
          cargo test --lib --bins
          for t in tests/*.rs; do
            name=$(basename "$t" .rs)
            if [ "$name" != "cross_sdk_parity" ] && \
               [ "$name" != "attribution_v2_conformance" ]; then
              cargo test --test "$name"
            fi
          done

  cross-sdk-conformance:
    name: cross-SDK attribution conformance
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: [python, go, typescript, rust]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        if: matrix.sdk == 'python'
        uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: Setup Go
        if: matrix.sdk == 'go'
        uses: actions/setup-go@v5
        with: { go-version: "1.21", cache-dependency-path: go/go.sum }
      - name: Setup Node
        if: matrix.sdk == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - name: Setup Rust
        if: matrix.sdk == 'rust'
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        if: matrix.sdk == 'rust'
        uses: Swatinem/rust-cache@v2
        with: { workspaces: rust }

      - name: P2 cost-map drift check (all SDKs)
        if: matrix.sdk == 'python'
        run: bash scripts/check_cost_map_drift.sh

      - name: Run cross-SDK conformance (python)
        if: matrix.sdk == 'python'
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-asyncio
          python -m pytest tests/test_cross_sdk_parity.py tests/test_attribution_v2_conformance.py -v

      - name: Run cross-SDK conformance (go)
        if: matrix.sdk == 'go'
        working-directory: go
        run: |
          go test -v -run '^TestCrossSDK' .
          go test -v -run '^(TestSharedAttributionV2Conformance|TestValidateEventV2)' ./attribution

      - name: Run cross-SDK conformance (typescript)
        if: matrix.sdk == 'typescript'
        working-directory: typescript
        run: |
          npm ci || npm install
          npx vitest run \
            tests/cross-sdk-parity.test.ts \
            tests/attribution-v2-conformance.test.ts \
            tests/attribution-v2-pusher-conformance.test.ts

      - name: Run cross-SDK conformance (rust)
        if: matrix.sdk == 'rust'
        working-directory: rust
        run: |
          cargo test --test cross_sdk_parity
          cargo test --test attribution_v2_conformance
