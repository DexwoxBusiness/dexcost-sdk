name: release-please

# Fully automated, end-to-end release management for the DexCost SDKs.
#
# How it works (no hand-written changelogs, version bumps, or manual tags):
#   1. Merge PRs to `main` using Conventional Commits:
#        feat: ...                  -> minor bump (0.x: patch, see bump-minor-pre-major)
#        fix: ...                   -> patch bump
#        feat!: / BREAKING CHANGE:  -> major bump (minor while < 1.0.0)
#        chore:/docs:/refactor: ... -> no release
#   2. release-please keeps an open "Release PR" per package that bumps the
#      version (python/pyproject.toml, typescript/package.json) AND regenerates
#      that package's CHANGELOG.md from those commits.
#   3. Merging a Release PR makes release-please create the git tag
#      (python/vX.Y.Z or typescript/vX.Y.Z) and a GitHub Release.
#   4. In the SAME run, the matching publish job below runs only for the package
#      that was released: Python -> PyPI (OIDC Trusted Publishing), TypeScript ->
#      npm (token for the first publish, then OIDC — see publish-typescript-npm).
#
# NOTE: the publish is intentionally folded INTO this workflow rather than living
# in a separate tag-triggered workflow. A tag pushed by the built-in GITHUB_TOKEN
# does NOT trigger other workflows (GitHub's recursive-run guard), so a standalone
# `on: push: tags` publish workflow would never fire from a release-please tag.
#
# Config lives in release-please-config.json + .release-please-manifest.json.

on:
  push:
    branches:
      - main

permissions:
  contents: write        # create release commits, tags, and GitHub Releases
  pull-requests: write   # open/update the Release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # True only when a release was actually cut (Release PR merged).
      python_released: ${{ steps.release.outputs['python--release_created'] }}
      python_tag: ${{ steps.release.outputs['python--tag_name'] }}
      typescript_released: ${{ steps.release.outputs['typescript--release_created'] }}
      typescript_tag: ${{ steps.release.outputs['typescript--tag_name'] }}
      rust_released: ${{ steps.release.outputs['rust--release_created'] }}
      rust_tag: ${{ steps.release.outputs['rust--tag_name'] }}
      go_released: ${{ steps.release.outputs['go--release_created'] }}
      go_tag: ${{ steps.release.outputs['go--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Uses release-please-config.json + .release-please-manifest.json.
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main

  publish-python-pypi:
    name: Publish Python to PyPI
    needs: release-please
    # Only run when the Python package was actually released this push.
    if: ${{ needs.release-please.outputs.python_released == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        working-directory: python
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
        # No username/password/token — OIDC Trusted Publishing handles auth.

  publish-typescript-npm:
    name: Publish TypeScript to npm
    needs: release-please
    # Only run when the TypeScript package was actually released this push.
    if: ${{ needs.release-please.outputs.typescript_released == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # signs npm provenance attestations (and enables OIDC later)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: typescript
        run: npm ci

      - name: Build (tsc + bundle JSON assets)
        working-directory: typescript
        run: npm run build

      - name: Publish to npm
        working-directory: typescript
        # FIRST PUBLISH uses an automation token (npm requires a package to exist
        # before OIDC Trusted Publishing can be configured). publishConfig in
        # package.json sets access=public + provenance=true, so this publish is
        # still signed (needs id-token: write above).
        #
        # TO MIGRATE TO TOKENLESS OIDC after the first successful publish:
        #   1. Configure the Trusted Publisher for @dexcost/sdk on npmjs.com
        #      (workflow: release-please.yml, this repo).
        #   2. Add a step to upgrade npm to >= 11.5.1:  npm install -g npm@latest
        #   3. Delete the `env:` block below and the NPM_TOKEN secret.
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-rust-crates:
    name: Publish Rust to crates.io
    needs: release-please
    # Only run when the Rust package was actually released this push.
    if: ${{ needs.release-please.outputs.rust_released == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for OIDC Trusted Publishing (after the first publish)
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Publish to crates.io
        working-directory: rust
        # FIRST PUBLISH uses an API token (crates.io requires a crate to exist
        # before Trusted Publishing can be linked). `cargo publish` runs a clean
        # verify-build of the packaged crate before uploading.
        #
        # TO MIGRATE TO TOKENLESS OIDC after the first successful publish:
        #   1. On crates.io, open the dexcost crate -> Settings -> Trusted
        #      Publishing, and add this repo + workflow (release-please.yml).
        #   2. Replace this step with the rust-lang/crates-io-auth-action to mint
        #      a short-lived token, then `cargo publish` (no stored secret):
        #        - uses: rust-lang/crates-io-auth-action@v1
        #          id: auth
        #        - run: cargo publish
        #          env: { CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }} }
        #   3. Delete the CARGO_REGISTRY_TOKEN secret.
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-go-proxy:
    name: Publish Go (index on pkg.go.dev)
    needs: release-please
    # Only run when the Go module was actually released this push.
    if: ${{ needs.release-please.outputs.go_released == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Go has no upload registry. release-please already created the tag
      # (go/vX.Y.Z) which IS the published version for the subdirectory module
      # github.com/DexwoxBusiness/dexcost-sdk/go. This job verifies the tagged
      # code builds, then warms the module proxy so pkg.go.dev indexes it.
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Verify the tagged module builds
        working-directory: go
        run: |
          go build ./...
          go vet ./...

      - name: Warm module proxy so pkg.go.dev indexes the release
        # go_tag is "go/vX.Y.Z"; the module version is the part after "go/".
        run: |
          set -euo pipefail
          VERSION="${GO_TAG#go/}"
          echo "Requesting proxy for github.com/DexwoxBusiness/dexcost-sdk/go@${VERSION}"
          # Go module proxy path: uppercase letters are escaped as !<lower>.
          PROXY="https://proxy.golang.org/github.com/!dexwox!business/dexcost-sdk/go/@v/${VERSION}.info"
          for i in 1 2 3 4 5 6; do
            if curl -fsS "$PROXY"; then echo; echo "indexed on proxy"; exit 0; fi
            echo "proxy not ready yet (attempt $i), waiting..."; sleep 20
          done
          echo "::warning::proxy did not return the version in time; it will index on first 'go get'."
        env:
          GO_TAG: ${{ needs.release-please.outputs.go_tag }}
