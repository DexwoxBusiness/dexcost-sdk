name: Release Python (PyPI) [manual backfill]

# MANUAL backfill / re-publish only. Normal releases are fully automated by
# release-please.yml (it builds + publishes to PyPI in the same run when a
# Release PR is merged). This workflow exists ONLY for the rare case where you
# need to (re)publish a specific already-existing tag by hand — e.g. a transient
# PyPI outage, or re-running a failed publish.
#
# It is NOT triggered by pushing tags: a tag pushed by release-please uses the
# built-in GITHUB_TOKEN, which (by GitHub's recursive-run guard) cannot trigger
# other workflows. So this is dispatch-only.
#
# Usage: Actions tab -> "Release Python (PyPI) [manual backfill]" -> Run workflow,
# choosing the tag/ref to publish from.
#
# Requires the PyPI Trusted Publisher registered for workflow `release-python.yml`,
# environment `pypi` (https://pypi.org/manage/account/publishing/).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        working-directory: python
        run: |
          set -euo pipefail
          PKG_VERSION="$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          TAG_VERSION="${GITHUB_REF_NAME#python/v}"
          echo "pyproject version: $PKG_VERSION   tag version: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match pyproject version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build sdist + wheel
        working-directory: python
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No username/password/token — OIDC Trusted Publishing handles auth.
        # Note: GitHub Releases, version bumps, and CHANGELOG.md are handled
        # automatically by release-please (.github/workflows/release-please.yml),
        # which creates the python/vX.Y.Z tag that triggers THIS publish workflow.
