name: Release Python (PyPI)

# Publishes the Python SDK to PyPI via Trusted Publishing (OIDC) — no API token
# is stored in the repo. Triggered by pushing a tag of the form `python/vX.Y.Z`,
# e.g.:
#   git tag python/v0.1.0
#   git push origin python/v0.1.0
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   Add a "pending publisher" (or, after first manual upload, a publisher) with:
#     PyPI project name: dexcost
#     Owner:             DexwoxBusiness
#     Repository:        dexcost-sdk
#     Workflow name:     release-python.yml
#     Environment:       pypi
# The `environment: pypi` below must match what you register on PyPI.

on:
  push:
    tags:
      - "python/v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        working-directory: python
        run: |
          set -euo pipefail
          PKG_VERSION="$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          TAG_VERSION="${GITHUB_REF_NAME#python/v}"
          echo "pyproject version: $PKG_VERSION   tag version: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match pyproject version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build sdist + wheel
        working-directory: python
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No username/password/token — OIDC Trusted Publishing handles auth.
        # Note: GitHub Releases, version bumps, and CHANGELOG.md are handled
        # automatically by release-please (.github/workflows/release-please.yml),
        # which creates the python/vX.Y.Z tag that triggers THIS publish workflow.
